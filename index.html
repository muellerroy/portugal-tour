<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portugal Camper-Tour</title>
<meta name="description" content="Reisebegleiter für die 4-wöchige Portugal Camper-Tour: Route, Spots, Wetter, Notizen.">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FAFAFB">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT Camper">

<!-- Fonts (fällt offline auf System-Schrift zurück) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

<!-- Leaflet (Karte) – lokal gebündelt, damit die App auch komplett offline startet -->
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="titles">
      <h1 id="topbar-title">Portugal Camper-Tour</h1>
      <div class="subtitle" id="topbar-subtitle">4 Wochen · flexibel unterwegs</div>
    </div>
    <button class="icon-btn" onclick="showScreen('settings')" aria-label="Einstellungen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2.4" fill="var(--bg)"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="15" cy="17" r="2.4" fill="var(--bg)"/></svg></button>
  </div>

  <main>
    <section id="screen-home" class="screen"></section>

    <section id="screen-map" class="screen">
      <div class="map-wrap" style="height: calc(100vh - 72px); height: calc(100dvh - 72px);">
        <div id="map"></div>
        <div class="map-legend" id="map-legend" role="group" aria-label="Spots nach Kategorie filtern">
          <button class="active" data-cat="all" aria-label="Alle Kategorien anzeigen">Alle</button>
          <button data-cat="natur" aria-label="Nur Natur anzeigen" title="Natur">🌿</button>
          <button data-cat="genuss" aria-label="Nur Genuss anzeigen" title="Genuss">🍷</button>
          <button data-cat="kultur" aria-label="Nur Kultur anzeigen" title="Kultur">🏛️</button>
          <button data-cat="camping" aria-label="Nur Camping anzeigen" title="Camping">🚐</button>
        </div>
        <button class="icon-btn locate-btn" id="locate-btn" title="Meinen Standort anzeigen" aria-label="Meinen Standort anzeigen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="6.5"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><line x1="12" y1="2.5" x2="12" y2="5.5"/><line x1="12" y1="18.5" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5.5" y2="12"/><line x1="18.5" y1="12" x2="21.5" y2="12"/></svg></button>
        <div class="route-info" id="route-info"></div>
        <div class="offline-banner">Offline · gespeicherte Kartenausschnitte</div>
      </div>
    </section>

    <section id="screen-regions" class="screen"></section>
    <section id="screen-journal" class="screen"></section>
    <section id="screen-settings" class="screen"></section>
  </main>

  <nav class="tabbar">
    <button class="tab" data-screen="home"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="15.5,8.5 13.5,13.5 8.5,15.5 10.5,10.5" /></svg></span>Übersicht</button>
    <button class="tab" data-screen="map"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 L3 6 L3 20 L9 18 L15 20 L21 18 L21 4 L15 6 Z"/><line x1="9" y1="4" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="20"/></svg></span>Karte</button>
    <button class="tab" data-screen="regions"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21 C12 21 5 14.5 5 9.5 A7 7 0 0 1 19 9.5 C19 14.5 12 21 12 21 Z"/><circle cx="12" cy="9.5" r="2.4"/></svg></span>Regionen</button>
    <button class="tab" data-screen="journal"><span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4 A2 2 0 0 1 7 2 H19 V20 H7 A2 2 0 0 0 5 22 Z"/><line x1="5" y1="4" x2="5" y2="20"/><line x1="9.5" y1="7" x2="15" y2="7"/></svg></span>Tagebuch</button>
  </nav>

  <div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet"></div>

</div>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="data/data.js"></script>
<script src="app.js"></script>
</body>
</html>
